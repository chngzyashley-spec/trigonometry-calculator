<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigonometry Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="trigonometry.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .result-decimal {
            color: #0d6efd;
        }
        .result-exact {
            color: #198754;
            font-size: 16px;
            font-weight: normal;
            margin-top: 4px;
        }
        .result-undefined {
            color: #dc3545;
        }
        .toast-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1050;
        }
        footer {
            background: #343a40;
            color: white;
            padding: 15px;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            margin: 0;
        }
        .ud-badge {
            display: inline-block;
            background: #dc3545;
            color: white;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 13px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .exact-label {
            font-size: 12px;
            color: #6c757d;
            font-weight: normal;
            display: block;
            margin-bottom: 2px;
        }
        .rad-input-wrap {
            position: relative;
            flex: 1;
            margin-right: 0.5rem;
        }
        .rad-input-wrap input {
            padding-right: 40px;
        }
        .rad-pi-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 13px;
            cursor: pointer;
            line-height: 1.4;
        }
        .rad-pi-btn:hover { background: #495057; }
        .rad-table { width: 100%; font-size: 15px; margin-top: 12px; }
        .rad-table th { background: #f0f4ff; font-weight: 600; }
        .rad-table td, .rad-table th { padding: 5px 8px; border: 1px solid #dee2e6; text-align: center; }
        .rad-ud { color: #dc3545; font-weight: bold; }
        .rad-exact { color: #198754; font-size: 13px; display: block; }
        .rad-decimal { color: #0d6efd; }
        .pi-presets { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .pi-presets button { font-size: 12px; padding: 2px 8px; }
    </style>
</head>
<body>
 
    <div class="toast-container" id="toastContainer"></div>
 
    <div class="container mt-5">
        <h2 class="mb-3">Trigonometry Calculator</h2>
        <div class="mb-3 d-flex">
            <select id="operation" class="form-select me-2">
                <option value="sin">sin</option>
                <option value="cos">cos</option>
                <option value="tan">tan</option>
                <option value="sec">sec</option>
                <option value="cosec">cosec</option>
                <option value="cot">cot</option>
            </select>
            <input type="number" id="angle" class="form-control me-2" placeholder="Enter angle (°)">
            <button class="btn btn-primary" onclick="calculate()">Calculate</button>
        </div>
        <div id="result" class="result mt-3"></div>
    </div>
 
    <div class="container">
        <h2 class="mb-3">Inverse Trigonometry Calculator</h2>
        <div class="mb-3 d-flex">
            <select id="inverseOperation" class="form-select me-2">
                <option value="asin">sin⁻¹</option>
                <option value="acos">cos⁻¹</option>
                <option value="atan">tan⁻¹</option>
                <option value="acot">cot⁻¹</option>
                <option value="asec">sec⁻¹</option>
                <option value="acosec">cosec⁻¹</option>
            </select>
            <input type="number" id="inverseAngle" class="form-control me-2" placeholder="Enter value">
            <button class="btn btn-primary" onclick="calculateInverse()">Calculate</button>
        </div>
        <div id="inverseResult" class="result mt-3"></div>
    </div>
 
    <script>
        // ── Helpers ──────────────────────────────────────────────────────────
 
        function showToast(message, type = 'danger') {
            let toastContainer = document.getElementById("toastContainer");
            let toast = document.createElement("div");
            let bgColor = type === 'success' ? 'bg-success' : 'bg-danger';
            toast.className = `toast align-items-center text-white ${bgColor} border-0 show`;
            toast.role = "alert";
            toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }
 
        /**
         * Determine if a float is mathematically undefined:
         *  - NaN (e.g. asin(2))
         *  - Infinity / -Infinity (e.g. tan(90), sec(90))
         *  - Extremely large magnitude that represents a pole (|val| > 1e12)
         */
        function isUndefined(val) {
            return !isFinite(val) || isNaN(val) || Math.abs(val) > 1e12;
        }
 
        // ── Exact-value lookup ────────────────────────────────────────────────
        // Key angles (degrees) and their known exact trig values.
        // Returns a string like "√3/2", "1/2", "√3", "−1", "0", or null.
 
        const EXACT_TRIG = {
            // [func]: { angleDeg: exactString }
            sin: {
                0: "0", 30: "1/2", 45: "√2/2", 60: "√3/2", 90: "1",
                120: "√3/2", 135: "√2/2", 150: "1/2", 180: "0",
                210: "−1/2", 225: "−√2/2", 240: "−√3/2", 270: "−1",
                300: "−√3/2", 315: "−√2/2", 330: "−1/2", 360: "0"
            },
            cos: {
                0: "1", 30: "√3/2", 45: "√2/2", 60: "1/2", 90: "0",
                120: "−1/2", 135: "−√2/2", 150: "−√3/2", 180: "−1",
                210: "−√3/2", 225: "−√2/2", 240: "−1/2", 270: "0",
                300: "1/2", 315: "√2/2", 330: "√3/2", 360: "1"
            },
            tan: {
                0: "0", 30: "1/√3", 45: "1", 60: "√3",
                120: "−√3", 135: "−1", 150: "−1/√3", 180: "0",
                210: "1/√3", 225: "1", 240: "√3",
                300: "−√3", 315: "−1", 330: "−1/√3", 360: "0"
            },
            sec: {
                0: "1", 30: "2/√3", 45: "√2", 60: "2",
                120: "−2", 135: "−√2", 150: "−2/√3", 180: "−1",
                210: "−2/√3", 225: "−√2", 240: "−2",
                300: "2", 315: "√2", 330: "2/√3", 360: "1"
            },
            cosec: {
                30: "2", 45: "√2", 60: "2/√3", 90: "1",
                120: "2/√3", 135: "√2", 150: "2",
                210: "−2", 225: "−√2", 240: "−2/√3", 270: "−1",
                300: "−2/√3", 315: "−√2", 330: "−2"
            },
            cot: {
                30: "√3", 45: "1", 60: "1/√3",
                90: "0", 120: "−1/√3", 135: "−1", 150: "−√3",
                210: "√3", 225: "1", 240: "1/√3",
                270: "0", 300: "−1/√3", 315: "−1", 330: "−√3"
            }
        };
 
        // Inverse trig exact values: value → degrees (as exact string)
        const EXACT_INVERSE = {
            asin:  { "0": "0°", "0.5": "30°", "1": "90°", "-0.5": "−30°", "-1": "−90°",
                     "0.7071067811865476": "45°", "-0.7071067811865476": "−45°",
                     "0.8660254037844387": "60°", "-0.8660254037844387": "−60°" },
            acos:  { "1": "0°", "0.5": "60°", "0": "90°", "-0.5": "120°", "-1": "180°",
                     "0.7071067811865476": "45°", "-0.7071067811865476": "135°",
                     "0.8660254037844387": "30°", "-0.8660254037844387": "150°" },
            atan:  { "0": "0°", "0.5773502691896258": "30°", "1": "45°", "1.7320508075688772": "60°",
                     "-0.5773502691896258": "−30°", "-1": "−45°", "-1.7320508075688772": "−60°" },
            acot:  { "0": "90°", "0.5773502691896258": "60°", "1": "45°", "1.7320508075688772": "30°",
                     "-0.5773502691896258": "120°", "-1": "135°", "-1.7320508075688772": "150°" },
            asec:  { "1": "0°", "2": "60°", "-1": "180°", "-2": "120°",
                     "1.4142135623730951": "45°", "-1.4142135623730951": "135°" },
            acosec:{ "1": "90°", "2": "30°", "-1": "−90°", "-2": "−30°",
                     "1.4142135623730951": "45°", "-1.4142135623730951": "−45°" }
        };
 
        /**
         * Try to find an exact value for trig(angleDeg).
         * Normalises angle to [0,360) to match the lookup table.
         * Returns a string or null.
         */
        function getExactTrig(func, angleDeg) {
            const table = EXACT_TRIG[func];
            if (!table) return null;
            let norm = ((angleDeg % 360) + 360) % 360;
            // Round to nearest integer degree for the lookup
            let key = Math.round(norm);
            if (key === 360) key = 0;
            return table.hasOwnProperty(key) ? table[key] : null;
        }
 
        /**
         * Try to find an exact value for inverse trig(value).
         * Matches by rounding computed float to known constants.
         */
        function getExactInverse(func, value) {
            const table = EXACT_INVERSE[func];
            if (!table) return null;
            // Try direct rounded-string lookup
            let rounded = parseFloat(value).toPrecision(13);
            for (const [k, v] of Object.entries(table)) {
                if (Math.abs(parseFloat(k) - parseFloat(value)) < 1e-9) return v;
            }
            return null;
        }
 
        // ── Undefined-reason messages ─────────────────────────────────────────
 
        function undefinedReason(func, angleDeg) {
            let norm = ((angleDeg % 360) + 360) % 360;
            const reasons = {
                tan:   [90, 270],
                sec:   [90, 270],
                cosec: [0, 180, 360],
                cot:   [0, 180, 360]
            };
            if (reasons[func] && reasons[func].some(a => Math.abs(norm - a) < 1e-9)) {
                return `${func}(${angleDeg}°) is <strong>Undefined (UD)</strong> — the function has a vertical asymptote at ${norm}°.`;
            }
            return `Result is <strong>Undefined (UD)</strong> — value is outside the domain of ${func}.`;
        }
 
        function inverseUndefinedReason(func, value) {
            const domains = {
                asin:   "−1 ≤ x ≤ 1",
                acos:   "−1 ≤ x ≤ 1",
                atan:   "all real numbers",
                acot:   "all real numbers",
                asec:   "|x| ≥ 1",
                acosec: "|x| ≥ 1"
            };
            return `<strong>Undefined (UD)</strong> — ${func.replace('a','')}⁻¹ requires ${domains[func] || 'a valid domain'}, but you entered <em>${value}</em>.`;
        }
 
        // ── Render helpers ────────────────────────────────────────────────────
 
        function renderResult(containerId, decimalVal, exactVal, isUD, udMessage) {
            const el = document.getElementById(containerId);
            if (isUD) {
                el.innerHTML = `<span class="result-undefined">⚠ ${udMessage}</span>`;
            } else {
                let html = `<span class="result-decimal">Decimal: ${decimalVal}</span>`;
                if (exactVal) {
                    html += `<br><span class="result-exact"><span class="exact-label">Exact value</span>${exactVal}</span>`;
                }
                el.innerHTML = html;
            }
        }
 
        // ── Main calculation functions ────────────────────────────────────────
 
        function calculate() {
            const angleInput = document.getElementById('angle').value;
            if (angleInput === "") {
                showToast("Please enter an angle value.");
                return;
            }
            const func = document.getElementById('operation').value;
            const angleDeg = parseFloat(angleInput);
            const radians = angleDeg * (Math.PI / 180);
            let raw;
 
            switch (func) {
                case 'sin':   raw = Math.sin(radians); break;
                case 'cos':   raw = Math.cos(radians); break;
                case 'tan':   raw = Math.tan(radians); break;
                case 'sec':   raw = 1 / Math.cos(radians); break;
                case 'cosec': raw = 1 / Math.sin(radians); break;
                case 'cot':   raw = 1 / Math.tan(radians); break;
                default:      raw = NaN;
            }
 
            // Round near-zero to exactly 0 (floating-point noise like sin(180°) = 1.2e-16)
            if (Math.abs(raw) < 1e-10) raw = 0;
 
            if (isUndefined(raw)) {
                renderResult('result', null, null, true, undefinedReason(func, angleDeg));
                showToast("Result is Undefined (UD).", 'danger');
            } else {
                const exact = getExactTrig(func, angleDeg);
                renderResult('result', raw.toFixed(6), exact, false);
                showToast("Calculation successful!", 'success');
            }
        }
 
        function calculateInverse() {
            const valueInput = document.getElementById('inverseAngle').value;
            if (valueInput === "") {
                showToast("Please enter a value.");
                return;
            }
            const func = document.getElementById('inverseOperation').value;
            const value = parseFloat(valueInput);
            let raw;
 
            switch (func) {
                case 'asin':   raw = Math.asin(value) * (180 / Math.PI); break;
                case 'acos':   raw = Math.acos(value) * (180 / Math.PI); break;
                case 'atan':   raw = Math.atan(value) * (180 / Math.PI); break;
                case 'acot':   raw = (Math.PI / 2 - Math.atan(value)) * (180 / Math.PI); break;
                case 'asec':   raw = Math.acos(1 / value) * (180 / Math.PI); break;
                case 'acosec': raw = Math.asin(1 / value) * (180 / Math.PI); break;
                default:       raw = NaN;
            }
 
            if (isUndefined(raw)) {
                renderResult('inverseResult', null, null, true, inverseUndefinedReason(func, valueInput));
                showToast("Result is Undefined (UD).", 'danger');
            } else {
                const exact = getExactInverse(func, value);
                // Show result in degrees with 6 decimal places, and exact if known
                const exactDisplay = exact ? `${exact} (exact)` : null;
                renderResult('inverseResult', raw.toFixed(6) + "°", exactDisplay, false);
                showToast("Calculation successful!", 'success');
            }
        }
    </script>
 
    <!-- Radian Calculator Section -->
    <div class="container">
        <h2 class="mb-1">Radian Calculator</h2>
        <p class="text-muted mb-3" style="font-size:13px;">Enter an angle in radians. Common values: π/6 ≈ 0.5236, π/4 ≈ 0.7854, π/3 ≈ 1.0472, π/2 ≈ 1.5708.</p>
 
        <div class="pi-presets">
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(0)">0</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(Math.PI/6)">π/6</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(Math.PI/4)">π/4</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(Math.PI/3)">π/3</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(Math.PI/2)">π/2</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(Math.PI)">π</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(3*Math.PI/2)">3π/2</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRad(2*Math.PI)">2π</button>
        </div>
 
        <div class="mb-3 d-flex align-items-center">
            <div class="rad-input-wrap">
                <input type="number" id="radAngle" class="form-control" placeholder="e.g. 1.5708" step="any">
                <button class="rad-pi-btn" onclick="insertPi()" title="Insert π">π</button>
            </div>
            <button class="btn btn-primary" onclick="calculateRad()">Calculate All</button>
        </div>
 
        <div id="radResult"></div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
    <footer>
        <p>&copy; 2026 Trigonometry Calculator | Made By Ashley :0</p>
    </footer>
</body>
</html>
